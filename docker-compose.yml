services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: tp
      POSTGRES_PASSWORD: tp
      POSTGRES_DB: tradingplatform
    ports:
      - "5432:5432"
    volumes:
      - tp_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tp
      MINIO_ROOT_PASSWORD: tppassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tp_minio:/data

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"

volumes:
  tp_pg:
  tp_minio:
